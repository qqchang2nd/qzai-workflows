name: QZAI Two-Stage PR Flow (Reusable)

on:
  workflow_call:
    secrets:
      # Multi-agent secrets routing (required per agentId).
      QZAI_AFEI_APP_ID: { required: false }
      QZAI_AFEI_APP_PRIVATE_KEY: { required: false }
      QZAI_AJI_APP_ID: { required: false }
      QZAI_AJI_APP_PRIVATE_KEY: { required: false }
      QZAI_JINGWUMING_APP_ID: { required: false }
      QZAI_JINGWUMING_APP_PRIVATE_KEY: { required: false }
      QZAI_LENGYAN_APP_ID: { required: false }
      QZAI_LENGYAN_APP_PRIVATE_KEY: { required: false }
      QZAI_LIXUNHUAN_APP_ID: { required: false }
      QZAI_LIXUNHUAN_APP_PRIVATE_KEY: { required: false }
      QZAI_LUXIAOFENG_APP_ID: { required: false }
      QZAI_LUXIAOFENG_APP_PRIVATE_KEY: { required: false }
      QZAI_MAIN_APP_ID: { required: false }
      QZAI_MAIN_APP_PRIVATE_KEY: { required: false }

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write

concurrency:
  group: qzai-two-stage-${{ github.repository }}-${{ github.event.comment.id || github.run_id }}
  cancel-in-progress: false

jobs:
  qzai-two-stage:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read apps mapping
        id: apps
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const p = path.join(process.env.GITHUB_WORKSPACE, '.qzai/apps.json');
            const raw = fs.readFileSync(p, 'utf8');
            core.setOutput('appsJson', raw);

      - name: Parse command (normalized first line)
        id: cmd
        uses: actions/github-script@v7
        with:
          script: |
            const body = String(context.payload.comment?.body || '');
            const firstLine = body.split(/\r?\n/)[0] || '';

            // Normalize to avoid command "black hole" across wrappers:
            // - take first line
            // - trim
            // - collapse all whitespace runs into a single space
            const normalized = firstLine.trim().replace(/\s+/g, ' ');

            const isPlan = normalized === '/qzai plan-pr';
            const isImpl = normalized === '/qzai impl-pr';
            if (!isPlan && !isImpl) {
              core.info('Skip: first line is not a normalized /qzai plan-pr or /qzai impl-pr');
              core.setOutput('skip', '1');
              return;
            }

            const kv = {};
            for (const line of body.split(/\r?\n/).slice(1)) {
              const m = line.match(/^\s*([A-Za-z0-9_\-]+)\s*:\s*(.+?)\s*$/);
              if (!m) continue;
              kv[m[1]] = m[2];
            }

            if (!kv.agentId) {
              core.setFailed('Missing required field: agentId');
              return;
            }
            if (isImpl && !kv.plan) {
              core.setFailed('Missing required field for /qzai impl-pr: plan');
              return;
            }

            core.setOutput('mode', isPlan ? 'plan' : 'impl');
            core.setOutput('agentId', kv.agentId);
            core.setOutput('planUrl', kv.plan || '');

      - name: Select agent GitHub App secrets (fail-closed)
        if: steps.cmd.outputs.skip != '1'
        id: sel
        shell: bash
        env:
          AGENT_ID: ${{ steps.cmd.outputs.agentId }}
          QZAI_AFEI_APP_ID: ${{ secrets.QZAI_AFEI_APP_ID }}
          QZAI_AFEI_APP_PRIVATE_KEY: ${{ secrets.QZAI_AFEI_APP_PRIVATE_KEY }}
          QZAI_AJI_APP_ID: ${{ secrets.QZAI_AJI_APP_ID }}
          QZAI_AJI_APP_PRIVATE_KEY: ${{ secrets.QZAI_AJI_APP_PRIVATE_KEY }}
          QZAI_JINGWUMING_APP_ID: ${{ secrets.QZAI_JINGWUMING_APP_ID }}
          QZAI_JINGWUMING_APP_PRIVATE_KEY: ${{ secrets.QZAI_JINGWUMING_APP_PRIVATE_KEY }}
          QZAI_LENGYAN_APP_ID: ${{ secrets.QZAI_LENGYAN_APP_ID }}
          QZAI_LENGYAN_APP_PRIVATE_KEY: ${{ secrets.QZAI_LENGYAN_APP_PRIVATE_KEY }}
          QZAI_LIXUNHUAN_APP_ID: ${{ secrets.QZAI_LIXUNHUAN_APP_ID }}
          QZAI_LIXUNHUAN_APP_PRIVATE_KEY: ${{ secrets.QZAI_LIXUNHUAN_APP_PRIVATE_KEY }}
          QZAI_LUXIAOFENG_APP_ID: ${{ secrets.QZAI_LUXIAOFENG_APP_ID }}
          QZAI_LUXIAOFENG_APP_PRIVATE_KEY: ${{ secrets.QZAI_LUXIAOFENG_APP_PRIVATE_KEY }}
          QZAI_MAIN_APP_ID: ${{ secrets.QZAI_MAIN_APP_ID }}
          QZAI_MAIN_APP_PRIVATE_KEY: ${{ secrets.QZAI_MAIN_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          agent="$AGENT_ID"
          app_id=""
          key=""
          case "$agent" in
            afei) app_id="$QZAI_AFEI_APP_ID"; key="$QZAI_AFEI_APP_PRIVATE_KEY";;
            aji) app_id="$QZAI_AJI_APP_ID"; key="$QZAI_AJI_APP_PRIVATE_KEY";;
            jingwuming) app_id="$QZAI_JINGWUMING_APP_ID"; key="$QZAI_JINGWUMING_APP_PRIVATE_KEY";;
            lengyan) app_id="$QZAI_LENGYAN_APP_ID"; key="$QZAI_LENGYAN_APP_PRIVATE_KEY";;
            lixunhuan) app_id="$QZAI_LIXUNHUAN_APP_ID"; key="$QZAI_LIXUNHUAN_APP_PRIVATE_KEY";;
            luxiaofeng) app_id="$QZAI_LUXIAOFENG_APP_ID"; key="$QZAI_LUXIAOFENG_APP_PRIVATE_KEY";;
            main) app_id="$QZAI_MAIN_APP_ID"; key="$QZAI_MAIN_APP_PRIVATE_KEY";;
            *) echo "::error::Fail-closed: unsupported agentId '$agent'"; exit 1;;
          esac
          if [[ -z "$app_id" || -z "$key" ]]; then
            echo "::error::Fail-closed: missing secrets for agentId=$agent. Please set the corresponding QZAI_<AGENT>_APP_ID and QZAI_<AGENT>_APP_PRIVATE_KEY secrets."
            exit 1
          fi
          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"
          {
            echo "APP_PRIVATE_KEY<<EOF"
            echo "$key"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Get installation id for repo (App JWT)
        if: steps.cmd.outputs.skip != '1'
        id: inst
        uses: actions/github-script@v7
        env:
          QZAI_APP_ID: ${{ steps.sel.outputs.app_id }}
          APP_PRIVATE_KEY: ${{ env.APP_PRIVATE_KEY }}
        with:
          # use default github token just to satisfy action; we will call REST via fetch with JWT
          github-token: ${{ github.token }}
          script: |
            const crypto = require('crypto');
            const appIdStr = String(process.env.QZAI_APP_ID || '');
            const privateKey = String(process.env.APP_PRIVATE_KEY || '');
            if (!privateKey) {
              core.setFailed('Fail-closed: missing APP_PRIVATE_KEY');
              return;
            }

            const now = Math.floor(Date.now() / 1000);
            const header = Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).toString('base64url');
            const payload = Buffer.from(JSON.stringify({ iat: now, exp: now + 600, iss: Number(appIdStr) })).toString('base64url');
            const toSign = `${header}.${payload}`;
            const sig = crypto.createSign('RSA-SHA256').update(toSign).sign(privateKey).toString('base64url');
            const jwt = `${toSign}.${sig}`;

            const url = `https://api.github.com/repos/${context.repo.owner}/${context.repo.repo}/installation`;
            const resp = await fetch(url, {
              method: 'GET',
              headers: {
                'Authorization': `Bearer ${jwt}`,
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
              },
            });
            if (!resp.ok) {
              const body = await resp.text();
              core.setFailed(`Fail-closed: failed to get repo installation: HTTP ${resp.status} ${body}`);
              return;
            }
            const data = await resp.json();
            const installationId = Number(data.id);
            if (!Number.isFinite(installationId) || installationId <= 0) {
              core.setFailed('Fail-closed: invalid installation id from GET /repos/{owner}/{repo}/installation');
              return;
            }
            core.setOutput('installation_id', String(installationId));

      - name: Create GitHub App installation token
        if: steps.cmd.outputs.skip != '1'
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ steps.sel.outputs.app_id }}
          private_key: ${{ env.APP_PRIVATE_KEY }}

      - name: Resolve app + fail-closed authz
        if: steps.cmd.outputs.skip != '1'
        id: auth
        uses: actions/github-script@v7
        env:
          APPS_JSON: ${{ steps.apps.outputs.appsJson }}
          AGENT_ID: ${{ steps.cmd.outputs.agentId }}
          QZAI_APP_ID: ${{ steps.sel.outputs.app_id }}
          APP_PRIVATE_KEY: ${{ env.APP_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ steps.inst.outputs.installation_id }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const apps = JSON.parse(process.env.APPS_JSON);
            const agentId = String(process.env.AGENT_ID || '');

            if (apps.version !== 1 || !apps.agents || typeof apps.agents !== 'object') {
              core.setFailed('Fail-closed: .qzai/apps.json must be v8 schema: { version: 1, agents: { ... } }');
              return;
            }

            const rec = apps.agents[agentId];
            if (!rec) {
              core.setFailed(`Fail-closed: agentId not allowed (not found in .qzai/apps.json agents map): ${agentId}`);
              return;
            }

            const expectedSlug = String(rec.appSlug || '');
            const expectedAppId = Number(rec.appId);
            const expectedInstallationId = Number(rec.installationId);
            if (!expectedSlug) {
              core.setFailed(`Fail-closed: missing required field .qzai/apps.json agents.${agentId}.appSlug`);
              return;
            }
            if (!Number.isFinite(expectedAppId) || expectedAppId <= 0) {
              core.setFailed(`Fail-closed: invalid .qzai/apps.json agents.${agentId}.appId (must be positive number)`);
              return;
            }
            if (!Number.isFinite(expectedInstallationId) || expectedInstallationId <= 0) {
              core.setFailed(`Fail-closed: invalid .qzai/apps.json agents.${agentId}.installationId (must be positive number)`);
              return;
            }

            // Fetch app identity using an App JWT (installation tokens cannot call GET /app, and /user may be blocked).
            // We build a short-lived JWT from QZAI_APP_ID + APP_PRIVATE_KEY and call GET /app with Authorization: Bearer <jwt>.
            const crypto = require('crypto');
            const appIdStr = String(process.env.QZAI_APP_ID || '');
            const privateKey = String(process.env.APP_PRIVATE_KEY || '');
            if (!privateKey) {
              core.setFailed('Fail-closed: missing APP_PRIVATE_KEY (QZAI_APP_PRIVATE_KEY secret)');
              return;
            }
            const now = Math.floor(Date.now() / 1000);
            const header = Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).toString('base64url');
            const payload = Buffer.from(JSON.stringify({ iat: now, exp: now + 600, iss: Number(appIdStr) })).toString('base64url');
            const toSign = `${header}.${payload}`;
            const sig = crypto.createSign('RSA-SHA256').update(toSign).sign(privateKey).toString('base64url');
            const jwt = `${toSign}.${sig}`;

            const resp = await fetch('https://api.github.com/app', {
              method: 'GET',
              headers: {
                'Authorization': `Bearer ${jwt}`,
                'Accept': 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
              },
            });
            if (!resp.ok) {
              const body = await resp.text();
              core.setFailed(`Fail-closed: GET /app via App JWT failed: HTTP ${resp.status} ${body}`);
              return;
            }
            const appData = await resp.json();

            const actualSlug = String(appData.slug || '');
            const actualAppId = Number(appData.id);
            const actualInstallationId = Number(process.env.INSTALLATION_ID);

            if (expectedSlug !== actualSlug) {
              core.setFailed(`Fail-closed: appSlug mismatch for agentId=${agentId}. expected=${expectedSlug} actual=${actualSlug}`);
              return;
            }
            if (!Number.isFinite(actualAppId) || actualAppId <= 0) {
              core.setFailed('Fail-closed: invalid runtime QZAI_APP_ID (must be positive number)');
              return;
            }
            if (expectedAppId !== actualAppId) {
              core.setFailed(`Fail-closed: appId mismatch for agentId=${agentId}. expected=${expectedAppId} actual=${actualAppId}`);
              return;
            }
            if (!Number.isFinite(actualInstallationId) || actualInstallationId <= 0) {
              core.setFailed('Fail-closed: invalid runtime installation_id from github-app-token');
              return;
            }
            if (expectedInstallationId !== actualInstallationId) {
              core.setFailed(`Fail-closed: installationId mismatch for agentId=${agentId}. expected=${expectedInstallationId} actual=${actualInstallationId}`);
              return;
            }

            core.setOutput('appSlug', actualSlug);
            core.setOutput('appId', String(actualAppId));
            core.setOutput('installationId', String(actualInstallationId));

      - name: Ignore bot self-comment
        if: steps.cmd.outputs.skip != '1'
        id: self
        uses: actions/github-script@v7
        env:
          APP_SLUG: ${{ steps.auth.outputs.appSlug }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const actor = String(context.payload.sender?.login || '').toLowerCase();
            const slug = String(process.env.APP_SLUG || '').toLowerCase();

            if (!actor || !slug) {
              core.info('Skip self-comment check: missing actor or APP_SLUG');
              return;
            }

            // Installation tokens may be blocked from calling /user in some repos.
            // Prevent loops by comparing sender login against app slug.
            // GitHub bot login is usually either '<slug>' or '<slug>[bot]'.
            if (actor === slug || actor === `${slug}[bot]`) {
              core.info(`Skip: ignore bot self comment to prevent loops: ${actor}`);
              core.setOutput('skip', '1');
            }


      - name: React eyes (best-effort)
        if: steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'eyes',
              });
            } catch (e) {
              core.warning(`eyes reaction failed: ${e.message}`);
            }

      - name: "PLAN: compute keys / idempotency"
        if: steps.cmd.outputs.mode == 'plan' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        id: plan
        uses: actions/github-script@v7
        env:
          AGENT_ID: ${{ steps.cmd.outputs.agentId }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const comment = context.payload.comment;
            const agentId = process.env.AGENT_ID;

            if (issue.pull_request) {
              core.setFailed('Fail-closed: /qzai plan-pr only allowed on Issue comments (not PR thread).');
              return;
            }

            const planKey = `i${issueNumber}-c${comment.id}`;
            const branch = `qzai/plan/${agentId}/${planKey}`;

            const head = `${owner}:${branch}`;
            const existing = await github.rest.pulls.list({ owner, repo, state: 'open', head, base: context.ref.replace('refs/heads/', '') });
            if ((existing.data || []).length > 0) {
              const pr = existing.data[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: [
                  '### QZAI plan-pr (idempotent)',
                  `已存在 Plan PR：${pr.html_url}`,
                  '',
                  `- planKey: \`${planKey}\``,
                  `- agentId: \`${agentId}\``
                ].join('\n')
              });
              core.setOutput('skipCreate', '1');
              core.setOutput('existingPrUrl', pr.html_url);
              core.setOutput('planPrNumber', String(pr.number || ''));
              core.setOutput('planSnapshotSha', String(pr.head?.sha || ''));
            }

            core.setOutput('planKey', planKey);
            core.setOutput('branch', branch);

      - name: "PLAN: write meta + snapshot files"
        if: steps.cmd.outputs.mode == 'plan' && steps.plan.outputs.skipCreate != '1' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        shell: bash
        env:
          PLAN_KEY: ${{ steps.plan.outputs.planKey }}
          ISSUE_JSON: ${{ toJson(github.event.issue) }}
          COMMENT_JSON: ${{ toJson(github.event.comment) }}
        run: |
          set -euo pipefail
          mkdir -p ".qzai/plans/$PLAN_KEY"
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const planKey = process.env.PLAN_KEY;

          // P0: validate planKey to prevent path traversal.
          if (!/^[A-Za-z0-9._-]+$/.test(planKey || '')) {
            console.error(`Fail-closed: invalid planKey (must match ^[A-Za-z0-9._-]+$): ${planKey}`);
            process.exit(1);
          }
          const issue = JSON.parse(process.env.ISSUE_JSON);
          const comment = JSON.parse(process.env.COMMENT_JSON);
          const meta = {
            planKey,
            issue: { number: issue.number, html_url: issue.html_url, title: issue.title },
            sourceComment: { id: comment.id, html_url: comment.html_url },
            createdAt: new Date().toISOString(),
          };
          const snapshot = {
            planKey,
            issue: {
              number: issue.number,
              title: issue.title,
              body: issue.body || '',
              labels: (issue.labels || []).map(l => (typeof l === 'string' ? l : l.name)).filter(Boolean)
            },
            snapshotAt: new Date().toISOString(),
          };
          const planTemplate = [
            '# PLAN',
            '',
            '## Context',
            '- 背景：',
            '- 目标：',
            '',
            '## Scope',
            '- In Scope:',
            '- Out of Scope:',
            '',
            '## Approach',
            '- 方案：',
            '- 风险与回滚：',
            '',
            '## DoD',
            '- [ ] 补充可验证的完成项 1',
            '- [ ] 补充可验证的完成项 2',
            '- [ ] 补充可验证的完成项 3',
            '',
            '## Validation',
            '- 测试：',
            '- 验收方式：',
            ''
          ].join('\n');
          fs.writeFileSync(path.join('.qzai','plans',planKey,'meta.json'), JSON.stringify(meta,null,2)+"\n");
          fs.writeFileSync(path.join('.qzai','plans',planKey,'snapshot.json'), JSON.stringify(snapshot,null,2)+"\n");

          // P0: Never overwrite an existing non-empty PLAN.md (data loss risk).
          const planMdPath = path.join('.qzai','plans',planKey,'PLAN.md');
          if (fs.existsSync(planMdPath)) {
            const existing = fs.readFileSync(planMdPath, 'utf8');
            if (String(existing || '').trim().length > 0) {
              console.error(`Fail-closed: PLAN.md already exists and is non-empty: ${planMdPath}. Refusing to overwrite.`);
              process.exit(1);
            }
          }
          fs.writeFileSync(planMdPath, planTemplate);
          NODE

      - name: "PLAN: create Plan PR (Meta + Snapshot)"
        if: steps.cmd.outputs.mode == 'plan' && steps.plan.outputs.skipCreate != '1' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        id: cpr-plan
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ steps.plan.outputs.branch }}
          delete-branch: false
          title: "plan: #${{ github.event.issue.number }}"
          commit-message: "qzai: plan snapshot for #${{ github.event.issue.number }}"
          body: |
            Refs #${{ github.event.issue.number }}

            v8 spec: https://github.com/qqchang2nd/qzai-workflows/issues/13#issuecomment-4018394185

            ### QZAI Plan Meta
            - planKey: `${{ steps.plan.outputs.planKey }}`
            - agentId: `${{ steps.cmd.outputs.agentId }}`
            - requestedBy: @${{ github.actor }}
            - sourceComment: ${{ github.event.comment.html_url }}

          labels: |
            qzai:plan
          add-paths: |
            .qzai/plans/${{ steps.plan.outputs.planKey }}/meta.json
            .qzai/plans/${{ steps.plan.outputs.planKey }}/snapshot.json
            .qzai/plans/${{ steps.plan.outputs.planKey }}/PLAN.md

      - name: "PLAN: attestation check-run"
        if: steps.cmd.outputs.mode == 'plan' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        uses: actions/github-script@v7
        env:
          PLAN_KEY: ${{ steps.plan.outputs.planKey }}
          AGENT_ID: ${{ steps.cmd.outputs.agentId }}
          APP_SLUG: ${{ steps.auth.outputs.appSlug }}
          APP_ID: ${{ steps.auth.outputs.appId }}
          INSTALLATION_ID: ${{ steps.auth.outputs.installationId }}
          PLAN_SNAPSHOT_SHA: ${{ steps.plan.outputs.planSnapshotSha || steps.cpr-plan.outputs.pull-request-head-sha }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = process.env.PLAN_SNAPSHOT_SHA;
            if (!sha) {
              core.setFailed('Missing PLAN_SNAPSHOT_SHA from create-pull-request output.');
              return;
            }
            const installationId = String(process.env.INSTALLATION_ID || '');
            if (!installationId) {
              core.setFailed('Fail-closed: missing installationId for plan attestation (A11).');
              return;
            }

            const summary = [
              `- planKey: \`${process.env.PLAN_KEY}\``,
              `- planSnapshotSha: \`${sha}\``,
              `- agentId: \`${process.env.AGENT_ID}\``,
              `- appSlug: \`${process.env.APP_SLUG}\``,
              `- appId: \`${process.env.APP_ID}\``,
              `- installationId: \`${installationId}\``
            ].join('\n');

            await github.rest.checks.create({
              owner,
              repo,
              name: 'qzai/plan-attestation',
              head_sha: sha,
              status: 'completed',
              conclusion: 'success',
              output: { title: 'QZAI Plan Attestation', summary }
            });

      - name: "PLAN: persist planSnapshotSha to PR body"
        if: steps.cmd.outputs.mode == 'plan' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.plan.outputs.planPrNumber || steps.cpr-plan.outputs.pull-request-number }}
          PLAN_SNAPSHOT_SHA: ${{ steps.plan.outputs.planSnapshotSha || steps.cpr-plan.outputs.pull-request-head-sha }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number(process.env.PR_NUMBER);
            const sha = process.env.PLAN_SNAPSHOT_SHA;
            if (!pull_number || !sha) return;
            const pr = await github.rest.pulls.get({ owner, repo, pull_number });
            const body = pr.data.body || '';
            if (/\bplanSnapshotSha:\s*`[0-9a-f]{40}`/i.test(body)) return;
            const next = `${body.trimEnd()}\n- planSnapshotSha: \`${sha}\`\n`;
            await github.rest.pulls.update({ owner, repo, pull_number, body: next });

      - name: "PLAN: comment back result"
        if: steps.cmd.outputs.mode == 'plan' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        uses: actions/github-script@v7
        env:
          PLAN_KEY: ${{ steps.plan.outputs.planKey }}
          PR_URL: ${{ steps.cpr-plan.outputs.pull-request-url || steps.plan.outputs.existingPrUrl }}
          PLAN_SNAPSHOT_SHA: ${{ steps.plan.outputs.planSnapshotSha || steps.cpr-plan.outputs.pull-request-head-sha }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;
            const url = process.env.PR_URL;
            const sha = process.env.PLAN_SNAPSHOT_SHA;
            const planKey = process.env.PLAN_KEY;
            const lines = [
              '### ✅ QZAI plan-pr',
              url ? `Plan PR: ${url}` : 'Plan PR: (unknown)',
              '',
              `- planKey: \`${planKey}\``,
              sha ? `- planSnapshotSha: \`${sha}\`` : '- planSnapshotSha: (unknown)'
            ];
            await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: lines.join('\n') });

      - name: "IMPL: validate plan + compute keys"
        if: steps.cmd.outputs.mode == 'impl' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        id: impl
        uses: actions/github-script@v7
        env:
          AGENT_ID: ${{ steps.cmd.outputs.agentId }}
          PLAN_URL: ${{ steps.cmd.outputs.planUrl }}
          APPS_JSON: ${{ steps.apps.outputs.appsJson }}
          # Expected app identity for the *impl* agent (used for later steps), not for plan attestation.
          APP_SLUG: ${{ steps.auth.outputs.appSlug }}
          APP_ID: ${{ steps.auth.outputs.appId }}
          INSTALLATION_ID: ${{ steps.auth.outputs.installationId }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prThread = context.payload.issue;
            const agentId = process.env.AGENT_ID;
            const planUrl = process.env.PLAN_URL;

            if (!prThread.pull_request) {
              core.setFailed('Fail-closed: /qzai impl-pr must be triggered from a PR conversation (issue_comment on PR).');
              return;
            }

            const m = planUrl.match(/^https:\/\/github\.com\/([^/]+)\/([^/]+)\/pull\/(\d+)(?:$|[?#])/i);
            if (!m) {
              core.setFailed(`Fail-closed: invalid plan PR url: ${planUrl}`);
              return;
            }
            const [_, planOwner, planRepo, planNumStr] = m;
            const planNumber = Number(planNumStr);
            if (planOwner !== owner || planRepo !== repo) {
              core.setFailed(`Fail-closed: plan PR must be in same repo. expected=${owner}/${repo} got=${planOwner}/${planRepo}`);
              return;
            }

            const planPr = await github.rest.pulls.get({ owner, repo, pull_number: planNumber });
            const planBody = planPr.data.body || '';

            const planKeyMatch = planBody.match(/\bplanKey:\s*`?([^`\n]+)`?/i);
            const agentIdMatch = planBody.match(/\bagentId:\s*`?([^`\n]+)`?/i);
            const refsMatch = planBody.match(/\bRefs\s+#(\d+)/i);
            if (!planKeyMatch || !agentIdMatch || !refsMatch) {
              core.setFailed('Fail-closed: plan PR body missing required fields (planKey/agentId/Refs #<issue>).');
              return;
            }
            const planKey = planKeyMatch[1].trim();
            // P0: validate planKey to prevent path traversal.
            if (!/^[A-Za-z0-9._-]+$/.test(planKey)) {
              core.setFailed(`Fail-closed: invalid planKey (must match ^[A-Za-z0-9._-]+$): ${planKey}`);
              return;
            }
            const planAgentId = agentIdMatch[1].trim();
            const issueNumber = Number(refsMatch[1]);
            // Allow implAgentId to differ from planAgentId, as long as both are valid and allowed.
            // The actual authorization check for `agentId` (implAgentId) is done in the `Select agent GitHub App secrets` step.
            // The `planAgentId` is extracted from the plan PR body.

            let planSnapshotSha = planPr.data.head?.sha || '';
            if (!planSnapshotSha) {
              const shaMatch = planBody.match(/\bplanSnapshotSha:\s*`?([0-9a-f]{40})`?/i);
              if (shaMatch) planSnapshotSha = shaMatch[1];
            }
            if (!planSnapshotSha) {
              core.setFailed('Fail-closed: cannot determine planSnapshotSha (plan PR head sha missing and body has no planSnapshotSha).');
              return;
            }

            const planMdPath = `.qzai/plans/${planKey}/PLAN.md`;
            let planMd = '';
            try {
              const planContent = await github.rest.repos.getContent({
                owner,
                repo,
                path: planMdPath,
                ref: planSnapshotSha,
              });
              if (Array.isArray(planContent.data) || planContent.data.type !== 'file' || !planContent.data.content) {
                core.setFailed(`Fail-closed: ${planMdPath} is missing or not a regular file in plan PR branch.`);
                return;
              }
              planMd = Buffer.from(planContent.data.content, 'base64').toString('utf8');
            } catch (e) {
              if (e.status === 404) {
                core.setFailed(`Fail-closed: required plan file not found in plan PR branch: ${planMdPath}`);
                return;
              }
              core.setFailed(`Fail-closed: cannot read required plan file ${planMdPath}: ${e.message}`);
              return;
            }

            const lines = planMd.split(/\r?\n/);
            // P1: allow DoD heading variants like "## DoD ✅" by matching word boundary.
            const dodStart = lines.findIndex(line => /^##\s+DoD\b/i.test(line));
            // Soft-fail for missing DoD: do NOT fail-closed; continue with placeholders.
            // Keep all other security fail-closed checks unchanged.
            const dodMissing = dodStart < 0;
            if (dodMissing) {
              core.warning(`Plan DoD section missing in ${planMdPath}; continuing with placeholder DoD.`);
            }

            let dodSection = '## DoD\n- [ ] (placeholder) PLAN.md missing `## DoD` section';
            let dodChecklist = '_Placeholder: PLAN.md missing `## DoD` section._';

            if (!dodMissing) {
              let dodEnd = lines.length;
              for (let i = dodStart + 1; i < lines.length; i++) {
                if (/^##\s+/.test(lines[i])) {
                  dodEnd = i;
                  break;
                }
              }
              dodSection = lines.slice(dodStart, dodEnd).join('\n').trimEnd();
              const checklistLines = lines
                .slice(dodStart + 1, dodEnd)
                .filter(line => /^\s*[-*]\s+\[[ xX]\]\s+/.test(line));
              dodChecklist = checklistLines.length > 0
                ? checklistLines.join('\n')
                : '_No markdown checklist items found under `## DoD` in PLAN.md._';
            }

            const checks = await github.rest.checks.listForRef({ owner, repo, ref: planSnapshotSha, per_page: 100 });
            const att = (checks.data.check_runs || []).find(c => c.name === 'qzai/plan-attestation');
            if (!att?.output?.summary) {
              core.setFailed('Fail-closed: missing qzai/plan-attestation check-run on planSnapshotSha.');
              return;
            }

            // Must-fix: close the issuer loop.
            // A same-named check-run could be forged by other workflows/apps with checks:write.
            // We must verify the creating App identity matches the *plan agent* GitHub App (not the impl agent).
            const apps = JSON.parse(String(process.env.APPS_JSON || '{}'));
            if (apps.version !== 1 || !apps.agents || typeof apps.agents !== 'object') {
              core.setFailed('Fail-closed: invalid APPS_JSON (expected v8 schema: {version:1, agents:{...}})');
              return;
            }
            const planRec = apps.agents[planAgentId];
            if (!planRec) {
              core.setFailed(`Fail-closed: planAgentId not allowed (not found in .qzai/apps.json): ${planAgentId}`);
              return;
            }
            const expectSlug = String(planRec.appSlug || '');
            const expectAppIdNum = Number(planRec.appId);
            const expectInstallationIdNum = Number(planRec.installationId);
            if (!expectSlug) {
              core.setFailed(`Fail-closed: missing .qzai/apps.json agents.${planAgentId}.appSlug`);
              return;
            }
            if (!Number.isFinite(expectAppIdNum) || expectAppIdNum <= 0) {
              core.setFailed(`Fail-closed: invalid .qzai/apps.json agents.${planAgentId}.appId (must be positive number)`);
              return;
            }
            if (!Number.isFinite(expectInstallationIdNum) || expectInstallationIdNum <= 0) {
              core.setFailed(`Fail-closed: invalid .qzai/apps.json agents.${planAgentId}.installationId (must be positive number)`);
              return;
            }

            const attApp = att.app;
            const attAppId = Number(attApp?.id);
            const attAppSlug = String(attApp?.slug || '');
            if (!Number.isFinite(attAppId) || attAppId <= 0 || !attAppSlug) {
              core.setFailed(`Fail-closed: attestation check-run has no app identity. got app.id=${attApp?.id} app.slug=${attApp?.slug}`);
              return;
            }
            if (attAppId !== expectAppIdNum || attAppSlug !== expectSlug) {
              core.setFailed(`Fail-closed: attestation issuer mismatch. expected app.id=${expectAppIdNum} app.slug=${expectSlug}; got app.id=${attAppId} app.slug=${attAppSlug}`);
              return;
            }

            const summary = att.output.summary;
            const expectId = String(expectAppIdNum);
            const expectInstallationId = String(expectInstallationIdNum);
            const expectPlanKey = planKey;
            const expectSha = planSnapshotSha;
            const expectAgentId = planAgentId;

            const requiredSnippets = [
              `planKey: \`${expectPlanKey}\``,
              `planSnapshotSha: \`${expectSha}\``,
              `agentId: \`${expectAgentId}\``,
              `appSlug: \`${expectSlug}\``,
              `appId: \`${expectId}\``,
              `installationId: \`${expectInstallationId}\``
            ];
            const missing = requiredSnippets.filter(s => !summary.includes(s));
            if (missing.length) {
              core.setFailed(`Fail-closed: attestation mismatch, missing: ${missing.join(', ')}. summary=${summary}`);
              return;
            }

            const implKey = planKey;
            const branch = `qzai/impl/${agentId}/${implKey}`;

            const head = `${owner}:${branch}`;
            const existing = await github.rest.pulls.list({ owner, repo, state: 'open', head, base: context.ref.replace('refs/heads/', '') });
            if ((existing.data || []).length > 0) {
              const pr = existing.data[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prThread.number,
                body: [
                  '### QZAI impl-pr (idempotent)',
                  `已存在 Impl PR：${pr.html_url}`,
                  '',
                  `- implKey: \`${implKey}\``,
                  `- plan: ${planUrl}`
                ].join('\n')
              });
              core.setOutput('skipCreate', '1');
              core.setOutput('existingPrUrl', pr.html_url);
            }

            core.setOutput('planKey', planKey);
            core.setOutput('planSnapshotSha', planSnapshotSha);
            core.setOutput('issueNumber', String(issueNumber));
            core.setOutput('planAgentId', planAgentId);
            core.setOutput('implAgentId', agentId);
            core.setOutput('branch', branch);
            core.setOutput('implKey', implKey);
            core.setOutput('planDodChecklist', dodChecklist);
            core.setOutput('planDodSectionB64', Buffer.from(dodSection, 'utf8').toString('base64'));

      - name: "IMPL: write meta + plan excerpt files"
        if: steps.cmd.outputs.mode == 'impl' && steps.impl.outputs.skipCreate != '1' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        shell: bash
        env:
          IMPL_KEY: ${{ steps.impl.outputs.implKey }}
          PLAN_KEY: ${{ steps.impl.outputs.planKey }}
          PLAN_SNAPSHOT_SHA: ${{ steps.impl.outputs.planSnapshotSha }}
          ISSUE_NUMBER: ${{ steps.impl.outputs.issueNumber }}
          PLAN_URL: ${{ steps.cmd.outputs.planUrl }}
          PLAN_DOD_SECTION_B64: ${{ steps.impl.outputs.planDodSectionB64 }}
        run: |
          set -euo pipefail
          mkdir -p ".qzai/impls/$IMPL_KEY"
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const meta = {
            implKey: process.env.IMPL_KEY,
            planKey: process.env.PLAN_KEY,
            planSnapshotSha: process.env.PLAN_SNAPSHOT_SHA,
            issueNumber: Number(process.env.ISSUE_NUMBER),
            planUrl: process.env.PLAN_URL,
            createdAt: new Date().toISOString(),
          };
          const dodSection = Buffer.from(process.env.PLAN_DOD_SECTION_B64 || '', 'base64').toString('utf8');
          const excerpt = [
            '# Plan Excerpt',
            '',
            `- Plan URL: ${process.env.PLAN_URL}`,
            `- planSnapshotSha: \`${process.env.PLAN_SNAPSHOT_SHA}\``,
            '',
            dodSection || '## DoD\n- [ ] Missing DoD excerpt',
            ''
          ].join('\n');
          fs.writeFileSync(path.join('.qzai','impls',process.env.IMPL_KEY,'meta.json'), JSON.stringify(meta,null,2)+"\n");
          fs.writeFileSync(path.join('.qzai','impls',process.env.IMPL_KEY,'plan_excerpt.md'), excerpt);
          NODE

      - name: "IMPL: create Impl PR"
        if: steps.cmd.outputs.mode == 'impl' && steps.impl.outputs.skipCreate != '1' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        id: cpr-impl
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ steps.impl.outputs.branch }}
          delete-branch: false
          title: "impl: plan ${{ steps.impl.outputs.planKey }}"
          commit-message: "qzai: impl stub for plan ${{ steps.impl.outputs.planKey }}"
          body: |
            Fixes #${{ steps.impl.outputs.issueNumber }}

            Implements plan: ${{ steps.cmd.outputs.planUrl }}

            v8 spec: https://github.com/qqchang2nd/qzai-workflows/issues/13#issuecomment-4018394185

            ### QZAI Impl Meta
            - implKey: `${{ steps.impl.outputs.implKey }}`
            - planKey: `${{ steps.impl.outputs.planKey }}`
            - planSnapshotSha: `${{ steps.impl.outputs.planSnapshotSha }}`
            - agentId: `${{ steps.cmd.outputs.agentId }}`
            - requestedBy: @${{ github.actor }}
            - sourceComment: ${{ github.event.comment.html_url }}

            ### Plan DoD Checklist
            ${{ steps.impl.outputs.planDodChecklist }}

          labels: |
            qzai:impl
          add-paths: |
            .qzai/impls/${{ steps.impl.outputs.implKey }}/meta.json
            .qzai/impls/${{ steps.impl.outputs.implKey }}/plan_excerpt.md

      - name: "IMPL: comment back result"
        if: steps.cmd.outputs.mode == 'impl' && steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.cpr-impl.outputs.pull-request-url || steps.impl.outputs.existingPrUrl }}
          PLAN_URL: ${{ steps.cmd.outputs.planUrl }}
          PLAN_AGENT_ID: ${{ steps.impl.outputs.planAgentId }}
          IMPL_AGENT_ID: ${{ steps.impl.outputs.implAgentId }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prIssueNumber = context.payload.issue.number;
            const url = process.env.PR_URL;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prIssueNumber,
              body: [
                '### ✅ QZAI impl-pr',
                url ? `Impl PR: ${url}` : 'Impl PR: (unknown)',
                `Plan: ${process.env.PLAN_URL}`,
                '',
                `- planAgentId: \`${process.env.PLAN_AGENT_ID}\``,
                `- implAgentId: \`${process.env.IMPL_AGENT_ID}\``
              ].join('\n')
            });

      - name: React rocket / cleanup eyes
        if: steps.cmd.outputs.skip != '1' && steps.self.outputs.skip != '1'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const comment_id = context.payload.comment.id;
            try {
              await github.rest.reactions.createForIssueComment({ owner, repo, comment_id, content: 'rocket' });
            } catch (e) {
              if (e.status !== 422) core.warning(`rocket reaction failed: ${e.message}`);
            }
            try {
              const reactions = await github.rest.reactions.listForIssueComment({ owner, repo, comment_id, per_page: 100 });
              const eyes = (reactions.data || []).find(r => r.content === 'eyes');
              if (eyes) {
                await github.rest.reactions.deleteForIssueComment({ owner, repo, comment_id, reaction_id: eyes.id });
              }
            } catch (e) {
              core.warning(`cleanup eyes failed: ${e.message}`);
            }
