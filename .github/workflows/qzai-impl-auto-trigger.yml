name: QZAI Implement Auto-trigger (on Plan PR merge)

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  auto-trigger-implement:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check if merged PR is a Plan PR and auto-trigger implement
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            // Check for qzai:plan label
            const labels = (pr.labels || []).map((l) => l.name);
            if (!labels.includes('qzai:plan')) {
              core.info(`Skip: merged PR #${prNumber} does not have qzai:plan label`);
              return;
            }

            core.info(`Plan PR #${prNumber} merged → auto-triggering /qzai implement`);
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: `/qzai implement\nautoTriggered: true\ntriggerReason: plan-pr-merged`,
            });
