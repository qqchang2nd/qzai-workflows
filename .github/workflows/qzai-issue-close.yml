name: QZAI Issue Auto-close (on Impl PR merge)

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  auto-close-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Slack notify start
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"[QZAI] workflow started: ${GITHUB_WORKFLOW}\\nrepo: ${GITHUB_REPOSITORY}\\nactor: ${GITHUB_ACTOR}\\nrun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - id: app-token
        uses: tibdex/github-app-token@3065cf300ef59631528306a1bcec6a18b7752881 # v2
        with:
          app_id: ${{ secrets.QZAI_APP_ID }}
          private_key: ${{ secrets.QZAI_APP_PRIVATE_KEY }}

      - name: Update linked Issue status to done after Impl PR merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            // Skip Plan PRs (they don't close issues directly)
            const labels = (pr.labels || []).map((l) => l.name);
            if (labels.includes('qzai:plan')) {
              core.info('Skip: Plan PR merge does not auto-close issues');
              return;
            }

            const body = pr.body || '';
            // Find all issue numbers referenced via Closes/Fixes/Resolves
            const refs = [...body.matchAll(/(?:closes?|fixes?|resolves?)\s+#(\d+)/gi)]
              .map((m) => parseInt(m[1], 10))
              .filter(Boolean);

            if (refs.length === 0) {
              core.info('No Closes/Fixes/Resolves references found in PR body');
              return;
            }

            for (const issueNumber of refs) {
              try {
                // Add status:done label
                const issueData = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
                const existing = (issueData.data.labels || []).map((l) => l.name);
                const toRemove = existing.filter((l) => l.startsWith('status:') && l !== 'status:done');

                for (const label of toRemove) {
                  try {
                    await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: label });
                  } catch {}
                }

                try {
                  await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: ['status:done'] });
                } catch (e) {
                  if (e.status !== 422) throw e;
                }

                core.info(`Issue #${issueNumber} status updated to done`);
              } catch (e) {
                core.warning(`Failed to update Issue #${issueNumber}: ${e.message}`);
              }
            }

      - name: Slack notify end
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"[QZAI] workflow finished: ${GITHUB_WORKFLOW}\\nstatus: ${JOB_STATUS}\\nrepo: ${GITHUB_REPOSITORY}\\nactor: ${GITHUB_ACTOR}\\nrun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}

