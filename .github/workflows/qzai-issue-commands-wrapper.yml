name: QZAI Issue Commands (This Repo)

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write

jobs:
  guard-two-stage-overlap:
    name: Guard two-stage overlap
    runs-on: ubuntu-latest
    outputs:
      allow_wrapper: ${{ steps.check.outputs.allow_wrapper }}
    steps:
      - name: Slack notify start
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          comment_url="${{ github.event.comment.html_url }}"
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"[QZAI] workflow started: ${GITHUB_WORKFLOW}\\nrepo: ${GITHUB_REPOSITORY}\\nactor: ${GITHUB_ACTOR}\\ncomment: ${comment_url}\\nrun: ${run_url}\"}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - id: check
        name: Check first-line command
        shell: bash
        run: |
          set -euo pipefail

          # Match the two-stage entrypoint using the SAME normalization strategy as two-stage:
          # - take first line
          # - trim
          # - collapse whitespace runs into a single space
          first_line="$(printf '%s' "${{ github.event.comment.body }}" | head -n 1)"
          first_line_trimmed="$(printf '%s' "$first_line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          first_line_normalized="$(printf '%s' "$first_line_trimmed" | tr -s '[:space:]' ' ')"

          if [[ "$first_line_normalized" == "/qzai plan-pr" || "$first_line_normalized" == "/qzai impl-pr" ]]; then
            echo "allow_wrapper=false" >> "$GITHUB_OUTPUT"
          else
            echo "allow_wrapper=true" >> "$GITHUB_OUTPUT"
          fi

  qzai-issue-commands:
    # Avoid overlap with the v8 two-stage entrypoint (/qzai plan-pr, /qzai impl-pr)
    needs: [guard-two-stage-overlap]
    if: ${{ needs.guard-two-stage-overlap.outputs.allow_wrapper == 'true' }}
    uses: ./.github/workflows/qzai-issue-commands.yml
    secrets: inherit

  slack-notify-end:
    needs: [guard-two-stage-overlap, qzai-issue-commands]
    if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Slack notify end
        shell: bash
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          comment_url="${{ github.event.comment.html_url }}"
          # prefer the real result of the called workflow if it ran, otherwise use guard result
          result="${{ needs.qzai-issue-commands.result || needs.guard-two-stage-overlap.result }}"
          curl -sS -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"[QZAI] workflow finished: ${GITHUB_WORKFLOW}\\nresult: ${result}\\nrepo: ${GITHUB_REPOSITORY}\\nactor: ${GITHUB_ACTOR}\\ncomment: ${comment_url}\\nrun: ${run_url}\"}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
