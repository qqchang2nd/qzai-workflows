name: QZAI PR Review Flow (Wrapper)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  call-review-flow:
    if: github.event.issue.pull_request != null
    uses: ./.github/workflows/qzai-pr-review.yml
    secrets: inherit
