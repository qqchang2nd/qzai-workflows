name: QZAI Plan Auto-trigger (on type:feat label)

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  auto-trigger-plan:
    if: github.event.label.name == 'type:feat'
    runs-on: ubuntu-latest
    steps:
      - name: Auto-trigger /qzai plan
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;

            // Only trigger if issue is not already in-progress or beyond
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map((l) => l.name);
            const skipStatuses = ['status:in-progress', 'status:review', 'status:done'];
            if (labels.some((l) => skipStatuses.includes(l))) {
              core.info(`Skip: issue already has progress status label`);
              return;
            }

            core.info(`Issue #${issueNumber} labeled type:feat → auto-triggering /qzai plan`);
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: `/qzai plan\nautoTriggered: true\ntriggerReason: type:feat-label-added`,
            });
