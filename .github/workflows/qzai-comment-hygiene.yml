name: qzai-comment-hygiene

on:
  issue_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  fix-escaped-newlines:
    name: Fix literal \\n in bot comments
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App token (qzai-bot)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.QZAI_BOT_APP_ID }}
          private-key: ${{ secrets.QZAI_BOT_PRIVATE_KEY }}

      - name: Sanitize comment body
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const c = context.payload.comment;
            if (!c) return;

            const author = (c.user && c.user.login) ? c.user.login : '';
            const isBot = author.endsWith('[bot]');
            const isQzaiBot = author.startsWith('qzai-') || author === 'qzai-bot[bot]';
            if (!isBot || !isQzaiBot) return;

            const body = c.body || '';
            // Detect literal backslash-n sequences in markdown ("\\n"), which should be real newlines.
            if (!body.includes('\\n')) return;

            const fixed = body.replace(/\\n/g, '\n');
            if (fixed === body) return;

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: c.id,
              body: fixed
            });

            core.notice(`Sanitized literal \\n in comment_id=${c.id}`);
